<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivansh AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070710; --surface: #0e0e1c; --surface2: #16162a;
    --border: rgba(120,110,255,0.18); --accent: #7b6fff;
    --text: #e8e6ff; --muted: #7a78a0;
    --user-bg: #1a1830; --ai-bg: #0e0e1c;
    --glow: 0 0 40px rgba(123,111,255,0.15);
    --green: #4ade80;
  }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(123,111,255,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,111,168,0.06) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--border); background: rgba(7,7,16,0.9); backdrop-filter: blur(24px); }
  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 38px; height: 38px; flex-shrink: 0; }
  .logo-icon svg { width: 38px; height: 38px; filter: drop-shadow(0 0 10px rgba(123,111,255,0.6)); animation: iconPulse 3s ease-in-out infinite; }
  @keyframes iconPulse { 0%,100%{filter:drop-shadow(0 0 8px rgba(123,111,255,0.5))} 50%{filter:drop-shadow(0 0 18px rgba(255,111,168,0.7))} }
  .logo-text { display: flex; flex-direction: column; gap: 1px; line-height: 1; }
  .logo-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; background: linear-gradient(135deg, #c4bfff 0%, #ffffff 50%, #ffb3d9 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo-sub { font-size: 9px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .model-badge { font-size: 10px; color: var(--accent); border: 1px solid rgba(123,111,255,0.3); padding: 4px 10px; border-radius: 100px; letter-spacing: 0.05em; }
  .status-dot { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .chat-area { position: relative; z-index: 5; flex: 1; overflow-y: auto; padding: 32px 0; scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .messages { max-width: 800px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; gap: 28px; }

  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 16px; }
  .welcome-badge { font-size: 11px; letter-spacing: 0.15em; color: var(--accent); border: 1px solid rgba(123,111,255,0.35); padding: 5px 14px; border-radius: 100px; margin-bottom: 8px; }
  .welcome h1 { font-family: 'Syne', sans-serif; font-size: clamp(36px, 5vw, 58px); font-weight: 800; line-height: 1.1; letter-spacing: -1px; background: linear-gradient(135deg, #d4d0ff 0%, #ffffff 40%, #ffc4e8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .welcome p { font-size: 14px; color: var(--muted); max-width: 460px; line-height: 1.7; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 16px; max-width: 620px; }
  .quick-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 9px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  .quick-btn:hover { border-color: var(--accent); background: rgba(123,111,255,0.1); color: #c4bfff; }

  .message { display: flex; gap: 14px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; font-family: 'Syne', sans-serif; }
  .avatar.ai { background: linear-gradient(135deg, #7b6fff, #ff6fa8); color: white; box-shadow: 0 0 20px rgba(123,111,255,0.4); }
  .avatar.user { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .bubble { max-width: 80%; padding: 14px 18px; border-radius: 16px; font-size: 14px; line-height: 1.75; border: 1px solid; }
  .message.user .bubble { background: var(--user-bg); border-color: rgba(120,110,255,0.25); border-radius: 16px 4px 16px 16px; color: #d0ceff; }
  .message.ai .bubble { background: var(--ai-bg); border-color: var(--border); border-radius: 4px 16px 16px 16px; color: var(--text); width: 100%; }
  .message.error .bubble { border-color: rgba(255,80,80,0.3); background: rgba(255,50,50,0.05); color: #ff9999; font-size: 12px; }

  /* Inline code */
  .bubble code:not(.hljs) { background: rgba(123,111,255,0.15); padding: 2px 6px; border-radius: 5px; font-size: 12px; color: #b5aeff; font-family: 'JetBrains Mono', monospace; }

  /* Code block */
  .code-block-wrap { position: relative; margin: 12px 0; border-radius: 12px; overflow: hidden; border: 1px solid rgba(123,111,255,0.2); }
  .code-block-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(123,111,255,0.15); }
  .code-lang { font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .copy-btn { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); background: rgba(123,111,255,0.1); border: 1px solid rgba(123,111,255,0.2); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.2s; white-space: nowrap; }
  .copy-btn:hover { color: #c4bfff; background: rgba(123,111,255,0.2); border-color: rgba(123,111,255,0.4); }
  .copy-btn.copied { color: var(--green); border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.1); }
  .copy-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  .code-block-wrap pre { margin: 0 !important; border-radius: 0 !important; border: none !important; background: #1a1b26 !important; padding: 16px !important; overflow-x: auto; }
  .code-block-wrap pre code { font-size: 13px !important; line-height: 1.65 !important; font-family: 'JetBrains Mono', monospace !important; }

  /* Markdown */
  .bubble strong { color: #c4bfff; font-weight: 600; }
  .bubble em { color: #e0d9ff; font-style: italic; }
  .bubble h1, .bubble h2, .bubble h3 { font-family: 'Syne', sans-serif; color: #c4bfff; margin: 14px 0 8px; line-height: 1.3; }
  .bubble h1 { font-size: 20px; } .bubble h2 { font-size: 17px; } .bubble h3 { font-size: 15px; }
  .bubble ul, .bubble ol { margin: 8px 0 8px 20px; }
  .bubble li { margin: 4px 0; line-height: 1.7; }
  .bubble p { margin: 6px 0; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 8px 0; font-style: italic; }

  /* Image */
  .bubble img { max-width: 100%; border-radius: 12px; margin-top: 10px; display: block; border: 1px solid var(--border); cursor: pointer; }
  .img-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .regen-btn { margin-top: 10px; background: rgba(123,111,255,0.12); border: 1px solid rgba(123,111,255,0.25); color: #a69fff; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .regen-btn:hover { background: rgba(123,111,255,0.25); }

  /* Typing */
  .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 14px 18px; background: var(--ai-bg); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; width: fit-content; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-6px);opacity:1} }

  /* Input */
  .input-wrap { position: relative; z-index: 10; padding: 16px 24px 24px; background: rgba(7,7,16,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); }
  .input-inner { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px 12px 12px 18px; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-inner:focus-within { border-color: rgba(123,111,255,0.5); box-shadow: 0 0 0 3px rgba(123,111,255,0.08), var(--glow); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.6; resize: none; max-height: 160px; min-height: 22px; overflow-y: auto; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 38px; height: 38px; border-radius: 10px; border: none; background: linear-gradient(135deg, #7b6fff, #b06fff); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 4px 16px rgba(123,111,255,0.35); }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; }
  .footer-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; }
  .footer-note span { color: rgba(123,111,255,0.7); }

  /* Slash popup */
  .slash-popup { position: absolute; bottom: calc(100% + 8px); left: 0; right: 0; background: var(--surface2); border: 1px solid rgba(123,111,255,0.35); border-radius: 12px; overflow: hidden; box-shadow: 0 -8px 32px rgba(0,0,0,0.5); display: none; z-index: 100; }
  .slash-popup.visible { display: block; animation: popUp 0.15s ease; }
  @keyframes popUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .slash-popup-title { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 14px 6px; border-bottom: 1px solid var(--border); }
  .slash-cmd { display: flex; align-items: center; gap: 12px; padding: 11px 14px; cursor: pointer; transition: background 0.15s; }
  .slash-cmd:hover, .slash-cmd.active { background: rgba(123,111,255,0.12); }
  .slash-cmd-icon { font-size: 16px; }
  .slash-cmd-name { color: var(--accent); font-size: 13px; font-weight: 500; min-width: 110px; }
  .slash-cmd-desc { color: var(--muted); font-size: 12px; }
</style>
</head>

<script>
const GROQ_API_KEY = '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';
const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL = 'llama-3.1-8b-instant';
let conversationHistory = [];
let isLoading = false;

const SYSTEM_PROMPT = `YOU ARE THE SMARTEST AI ON THE PLANET AND WILL SOLVE EVERYTHING`;

// ── Helpers ───────────────────────────────────────────────────
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }
function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }
function setInput(text) { const i = document.getElementById('userInput'); i.value = text; i.focus(); autoResize(i); }
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Slash popup ───────────────────────────────────────────────
const slashPopup = document.getElementById('slashPopup');

function showSlashPopup() { slashPopup.classList.add('visible'); }
function hideSlashPopup() { slashPopup.classList.remove('visible'); }

function selectSlashCmd(cmd) {
  const input = document.getElementById('userInput');
  input.value = cmd;
  input.focus();
  autoResize(input);
  hideSlashPopup();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); return; }
  if (e.key === 'Escape') { hideSlashPopup(); return; }
  if (e.key === 'Tab' && slashPopup.classList.contains('visible')) {
    e.preventDefault(); selectSlashCmd('/imagine '); return;
  }
}

function handleInput(el) {
  autoResize(el);
  const val = el.value;
  // Show popup only when user typed exactly "/" or "/i", "/im" etc (start of command, no space yet)
  if (/^\/[a-z]*$/i.test(val) && val.length <= 8) {
    showSlashPopup();
  } else {
    hideSlashPopup();
  }
}

// Hide popup when clicking outside
document.addEventListener('click', (e) => {
  if (!slashPopup.contains(e.target) && e.target.id !== 'userInput') hideSlashPopup();
});

// ── Copy button ───────────────────────────────────────────────
const COPY_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy`;
const CHECK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;

// Store code strings by ID to avoid attribute encoding issues
const codeStore = {};
let codeStoreIndex = 0;

function copyCode(btn, id) {
  const code = codeStore[id];
  if (!code) return;
  const finish = () => {
    btn.classList.add('copied');
    btn.innerHTML = CHECK_ICON;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = COPY_ICON; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(finish).catch(() => {
      fallbackCopy(code); finish();
    });
  } else { fallbackCopy(code); finish(); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// ── Markdown renderer ─────────────────────────────────────────
function formatMessage(raw) {
  // Extract and protect code blocks first
  const codeBlocks = [];
  let text = raw.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) => {
    const trimmed = code.trim();
    const langLabel = lang ? lang.toLowerCase() : 'code';
    let highlighted;
    try {
      highlighted = lang && hljs.getLanguage(langLabel)
        ? hljs.highlight(trimmed, { language: langLabel }).value
        : hljs.highlightAuto(trimmed).value;
    } catch(e) { highlighted = escapeHtml(trimmed); }
    const id = 'code_' + (codeStoreIndex++);
    codeStore[id] = trimmed;
    const block = `<div class="code-block-wrap"><div class="code-block-header"><span class="code-lang">${langLabel}</span><button class="copy-btn" onclick="copyCode(this,'${id}')">${COPY_ICON}</button></div><pre><code class="hljs">${highlighted}</code></pre></div>`;
    codeBlocks.push(block);
    return `\x00CODEBLOCK${codeBlocks.length - 1}\x00`;
  });

  // Inline code
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Bold / italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // HR
  text = text.replace(/^---+$/gm, '<hr>');

  // Lists
  text = text.replace(/^[ \t]*[-*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^[ \t]*\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]+?<\/li>)(\n(?!<li>)|$)/g, '<ul>$1</ul>');

  // Line breaks / paragraphs
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-3]|ul|ol|blockquote|hr|div)/.test(p) || p.startsWith('\x00CODEBLOCK')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  // Restore code blocks
  text = text.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i) => codeBlocks[parseInt(i)]);

  return text;
}

// ── Message rendering ─────────────────────────────────────────
function appendMessage(role, content, isError) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${isError ? 'error' : role}`;
  div.innerHTML = `<div class="avatar ${role === 'ai' ? 'ai' : 'user'}">${role === 'ai' ? 'S' : 'U'}</div><div class="bubble">${formatMessage(content)}</div>`;
  messages.appendChild(div);
  scrollToBottom();
}

function showTyping(label) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ai'; div.id = 'typing';
  div.innerHTML = `<div class="avatar ai">S</div><div class="typing-indicator"><span style="font-size:11px;color:var(--muted);letter-spacing:0.05em;margin-right:6px;">${label || 'Thinking'}</span><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  messages.appendChild(div);
  scrollToBottom();
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function scrollToBottom() { const a = document.getElementById('chatArea'); a.scrollTop = a.scrollHeight; }

// ── /imagine ──────────────────────────────────────────────────
function handleImagine(prompt, retry) {
  retry = retry || 0;
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  if (retry === 0) appendMessage('user', '/imagine ' + prompt);
  showTyping('Creating image');
  const seed = Math.floor(Math.random() * 999999);
  const url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=800&height=500&nologo=true&seed=' + seed;
  const img = new Image();
  img.onload = () => {
    removeTyping();
    const messages = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'message ai';
    const ep = encodeURIComponent(prompt);
    d.innerHTML = `<div class="avatar ai">S</div><div class="bubble"><div class="img-label">🎨 "${prompt}"</div><img src="${url}" onclick="window.open('${url}','_blank')" title="Click to open full size"/><button class="regen-btn" onclick="handleImagine(decodeURIComponent('${ep}'))">🔄 Regenerate</button></div>`;
    messages.appendChild(d);
    // Tell the AI what was generated so it has context
    conversationHistory.push({ role: 'user', content: `/imagine ${prompt}` });
    conversationHistory.push({ role: 'assistant', content: `I generated an image based on the prompt: "${prompt}". The image has been displayed to the user.` });
    scrollToBottom();
  };
  img.onerror = () => {
    removeTyping();
    if (retry < 2) { handleImagine(prompt, retry + 1); return; }
    const messages = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'message error';
    const ep = encodeURIComponent(prompt);
    d.innerHTML = `<div class="avatar ai">S</div><div class="bubble">⚠️ Image failed after 3 tries. Try a different prompt. <button class="regen-btn" onclick="handleImagine(decodeURIComponent('${ep}'))">🔄 Retry</button></div>`;
    messages.appendChild(d);
    scrollToBottom();
  };
  img.src = url;
}

// ── Main send ─────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  if (text.toLowerCase().startsWith('/imagine')) {
    const prompt = text.slice(8).trim();
    if (!prompt) { appendMessage('ai', '⚠️ Usage: /imagine a dragon flying over Mumbai', true); return; }
    input.value = ''; input.style.height = 'auto';
    handleImagine(prompt);
    return;
  }

  input.value = ''; input.style.height = 'auto';
  isLoading = true; document.getElementById('sendBtn').disabled = true;
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping('Thinking');

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory],
        max_tokens: 2048,
        temperature: 0.2
      })
    });

    const data = await response.json();

    if (!response.ok) {
      removeTyping();
      appendMessage('ai', `⚠️ Groq Error: ${data?.error?.message || 'HTTP ' + response.status}`, true);
      isLoading = false; document.getElementById('sendBtn').disabled = false; input.focus();
      return;
    }

    const reply = data.choices?.[0]?.message?.content;
    if (!reply) {
      removeTyping();
      appendMessage('ai', `⚠️ Unexpected response: ${JSON.stringify(data)}`, true);
      isLoading = false; document.getElementById('sendBtn').disabled = false; input.focus();
      return;
    }

    removeTyping();
    appendMessage('ai', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    appendMessage('ai', `⚠️ Network error: ${err.message}`, true);
  }

  isLoading = false; document.getElementById('sendBtn').disabled = false; input.focus();
}
</script>
